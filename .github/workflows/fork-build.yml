name: Fork build

on:
  push:
    branches: [rt/cross-album-share]
  workflow_dispatch:
    inputs:
      tag:
        description: Override image tag (defaults to nearest upstream vX.Y.Z)
        required: false

permissions:
  contents: read
  packages: write

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch upstream tags
        run: |
          git remote add upstream https://github.com/immich-app/immich.git || true
          git fetch upstream --tags --no-recurse-submodules

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tag
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG=$(git describe --tags --abbrev=0 --match 'v[0-9]*.[0-9]*.[0-9]*' 2>/dev/null || true)
            if [[ -z "$TAG" ]]; then
              echo "No upstream semver tag reachable from HEAD" >&2
              exit 1
            fi
          fi
          if [[ "$TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            MAJOR="v${BASH_REMATCH[1]}"
            MINOR="v${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
            REPO="ghcr.io/${{ github.repository_owner }}/immich-server"
            {
              echo "tags<<EOF"
              echo "$REPO:$TAG"
              echo "$REPO:$MINOR"
              echo "$REPO:$MAJOR"
              echo "$REPO:latest"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "tags=ghcr.io/${{ github.repository_owner }}/immich-server:$TAG" >> "$GITHUB_OUTPUT"
          fi
          echo "Tag: $TAG"

      - name: Build & push immich-server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tag.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
