name: Fork build

on:
  push:
    branches: [rt/cross-album-share]
    tags: ['rt-v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag to publish
        required: true

permissions:
  contents: read
  packages: write

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tag
        id: tag
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(git describe --tags --always --dirty)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push immich-server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/immich-server:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/immich-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
