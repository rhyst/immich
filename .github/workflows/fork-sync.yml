name: Fork sync

on:
  schedule:
    - cron: '17 7 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      PATCH_BRANCH: rt/cross-album-share
      UPSTREAM_REPO: https://github.com/immich-app/immich.git
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.PATCH_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "fork-sync[bot]"
          git config user.email "fork-sync@users.noreply.github.com"
          git remote add upstream "$UPSTREAM_REPO" || git remote set-url upstream "$UPSTREAM_REPO"

      - name: Fetch upstream tags
        run: git fetch upstream --tags --prune

      - name: Detect tags
        id: detect
        run: |
          LATEST=$(git -c versionsort.suffix=- tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -1)
          CURRENT=$(git describe --tags --abbrev=0 --match 'v[0-9]*.[0-9]*.[0-9]*' "${PATCH_BRANCH}" 2>/dev/null || echo "")
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Latest upstream stable: $LATEST"
          echo "Current patch base:     $CURRENT"

      - name: Skip if up to date
        if: steps.detect.outputs.latest == steps.detect.outputs.current
        run: echo "Already on ${{ steps.detect.outputs.current }}, nothing to do."

      - name: Attempt rebase
        if: steps.detect.outputs.latest != steps.detect.outputs.current
        id: rebase
        run: |
          set +e
          git checkout "${PATCH_BRANCH}"
          git rebase "${{ steps.detect.outputs.latest }}"
          rc=$?
          if [ $rc -ne 0 ]; then
            git rebase --abort || true
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "ok=true" >> "$GITHUB_OUTPUT"

      - name: Push rebased branch
        if: steps.rebase.outputs.ok == 'true'
        run: git push --force-with-lease origin "${PATCH_BRANCH}"

      - name: Open issue on conflict
        if: steps.rebase.outputs.ok == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const latest = '${{ steps.detect.outputs.latest }}';
            const current = '${{ steps.detect.outputs.current }}';
            const title = `Manual rebase needed: ${latest}`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'fork-sync',
            });
            if (existing.data.some(i => i.title === title)) {
              core.info('Issue already open, skipping.');
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              labels: ['fork-sync'],
              body: [
                `The fork-sync workflow could not auto-rebase \`rt/cross-album-share\` from \`${current}\` onto \`${latest}\`.`,
                '',
                'To resolve manually:',
                '```',
                'git fetch upstream --tags',
                'git checkout rt/cross-album-share',
                `git rebase ${latest}`,
                '# resolve conflicts, then:',
                'git push --force-with-lease origin rt/cross-album-share',
                `git tag rt-${latest}-1 && git push origin rt-${latest}-1`,
                '```',
              ].join('\n'),
            });
